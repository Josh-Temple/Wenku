<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wenku Markdown Publisher</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github.min.css" id="hljs-light" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/styles/github-dark.min.css" id="hljs-dark" disabled />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Wenku Markdown Publisher</h1>
      <div class="header-controls">
        <label class="theme-toggle" for="themeSelect">Theme
          <select id="themeSelect">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>
        </label>
      </div>
    </header>

    <section class="config-panel" id="configPanel">
      <h2>GitHub Repository Settings</h2>
      <div class="grid">
        <label>Owner <input id="ownerInput" placeholder="your-github-org-or-user" /></label>
        <label>Repository <input id="repoInput" placeholder="repository-name" /></label>
        <label>Branch <input id="branchInput" value="main" /></label>
        <label>Content Directory <input id="contentDirInput" value="content" /></label>
      </div>
      <label>GitHub Token (repo read/write)
        <input id="tokenInput" type="password" placeholder="ghp_... or GitHub App installation token" />
      </label>
      <div class="button-row">
        <button id="connectBtn">Connect</button>
        <button id="saveConfigBtn" class="secondary">Save Local Config</button>
      </div>
      <p class="help-text">Token is stored only in your browser localStorage. For production, prefer GitHub App/OAuth-backed token exchange.</p>
      <p id="statusMsg" class="status"></p>
    </section>

    <main class="layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <h2>Documents</h2>
          <button id="newDocBtn">New</button>
        </div>
        <ul id="docList"></ul>
      </aside>

      <section class="editor-pane">
        <div class="editor-toolbar">
          <label>File Path
            <input id="pathInput" value="content/welcome.md" />
          </label>
          <label>Commit Message
            <input id="commitMessageInput" value="docs: update markdown content" />
          </label>
          <div class="toolbar-actions">
            <button id="loadDocBtn" class="secondary">Load</button>
            <button id="saveDocBtn">Commit & Publish</button>
          </div>
        </div>
        <textarea id="editor" spellcheck="false"></textarea>
      </section>

      <section class="preview-pane">
        <h2>Preview</h2>
        <article id="preview" class="markdown-body"></article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.10.0/lib/highlight.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
